<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trip Planner</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',Roboto,sans-serif;
}
body{
  background:#4f46e5;
  min-height:100vh;
  padding:20px;
}
.container{
  max-width:900px;
  margin:0 auto;
  background:#fff;
  border-radius:20px;
  padding:35px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}
.header{
  text-align:center;
  margin-bottom:30px;
}
.header h1{
  color:#111;
  font-size:28px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.header p{
  color:#555;
}
.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
  margin-bottom:25px;
}
.form-group{
  display:flex;
  flex-direction:column;
  gap:7px;
}
.form-group label{
  font-weight:600;
  color:#222;
  font-size:14px;
}
.form-group input,
.form-group select,
.form-group textarea{
  padding:12px 14px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:15px;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
  outline:none;
  border-color:#4f46e5;
}
.form-group textarea{
  min-height:90px;
  resize:vertical;
}
.btn-generate{
  width:100%;
  padding:15px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.btn-generate:hover{
  background:#4338ca;
}
.btn-generate:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
.result{
  margin-top:30px;
  padding:25px;
  background:#f8fafc;
  border-radius:15px;
  display:none;
  white-space:pre-line;
  line-height:1.65;
  color:#111;
}
.loading{
  color:#4f46e5;
  text-align:center;
  padding:15px;
}
.error{
  color:#dc2626;
  text-align:center;
  padding:15px;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-globe-americas"></i> AI Trip Planner</h1>
    <p>Generate your perfect travel itinerary in seconds</p>
  </div>

  <div class="form-grid">
    <div class="form-group">
      <label>Destination</label>
      <input type="text" id="destination" placeholder="e.g. Tokyo, Bali, Paris" required>
    </div>

    <div class="form-group">
      <label>Start Date</label>
      <input type="date" id="startDate" required>
    </div>

    <div class="form-group">
      <label>End Date</label>
      <input type="date" id="endDate" required>
    </div>

    <div class="form-group">
      <label>Travelers</label>
      <input type="number" id="travelers" min="1" value="2" required>
    </div>

    <div class="form-group">
      <label>Budget</label>
      <select id="budget">
        <option value>Budget Type</option>
        <option value="Budget">Budget (Low Cost)</option>
        <option value="Moderate" selected>Moderate (Balanced)</option>
        <option value="Luxury">Luxury (High End)</option>
      </select>
    </div>

    <div class="form-group" style="grid-column:1/-1;">
      <label>Interests & Preferences</label>
      <textarea id="interests" placeholder="e.g. food, nature, history, beach, shopping, family friendly, quiet, adventure..."></textarea>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generatePlan()">
    <i class="fas fa-rocket"></i> Generate Trip Plan
  </button>

  <div class="result" id="resultSection"></div>
</div>

<script>
function generatePlan() {
  const dest = document.getElementById('destination').value.trim();
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  const people = document.getElementById('travelers').value;
  const budget = document.getElementById('budget').value;
  const interests = document.getElementById('interests').value.trim();
  const btn = document.getElementById('generateBtn');
  const res = document.getElementById('resultSection');

  if (!dest || !start || !end || !people || !budget) {
    alert('Please fill all required fields');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
  res.style.display = 'block';
  res.innerHTML = '<div class="loading">Creating your personalized itinerary...</div>';

  setTimeout(() => {
    try {
      const plan = `
Your ${daysBetween(start, end)}-Day Travel Plan to ${dest.toUpperCase()}

📅 Travel Period: ${formatDate(start)} to ${formatDate(end)}
👥 Travelers: ${people}
💰 Budget: ${budget}
✨ Interests: ${interests || 'General sightseeing'}

---

DAY 1: Arrival & City Orientation
- Check into accommodation
- Visit central landmarks
- Local dinner & easy walk

DAY 2: Main Attractions
- Top sightseeing spots
- Recommended local food
- Transportation tips

DAY 3: Culture & Experience
- Museums, local markets or nature spots
- Free time for shopping or relaxation

DAY 4: Day Trip / Adventure
- Optional day trip nearby
- Outdoor or cultural activity
- Evening leisure

DAY 5: Relaxation & Departure
- Brunch & last-minute exploration
- Head to airport/station

---
ACCOMMODATION SUGGESTIONS:
- Near city center for convenience
- Match your ${budget} budget

TRANSPORTATION:
- Public transit / walk / ride-hailing based on location

TIPS:
- Bring comfortable shoes
- Check local weather
- Respect local customs
- Keep digital copies of documents
      `;

      res.innerText = plan;

    } catch (e) {
      res.innerHTML = '<div class="error">Failed to generate plan. Please try again.</div>';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-rocket"></i> Generate Trip Plan';
    }
  }, 1800);
}

function daysBetween(start, end) {
  const a = new Date(start);
  const b = new Date(end);
  const diff = Math.abs(b - a);
  return Math.ceil(diff / (1000 * 60 * 60 * 24)) + 1;
}

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return date.toLocaleDateString('en-US', {
    year: 'numeric', month: 'long', day: 'numeric'
  });
}
</script>
</body>
</html>
