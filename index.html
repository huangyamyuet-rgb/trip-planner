<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trip Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script>tailwind.config={theme:{extend:{colors:{primary:'#165DFF',neutral:'#F5F7FA'}}}}</script>
</head>
<body class="bg-neutral min-h-screen">
<header class="bg-white shadow sticky top-0 z-50">
    <div class="container px-4 py-4 flex items-center gap-2">
        <i class="fa fa-plane text-primary text-2xl"></i>
        <h1 class="text-xl font-bold text-primary">AI Trip Planner</h1>
    </div>
</header>

<main class="container px-4 py-8 max-w-4xl mx-auto">
<section class="bg-white rounded-2xl p-6 shadow mb-6">
    <h2 class="text-xl font-bold mb-4 text-center">Travel Plan</h2>
    <form id="form1" class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div><label class="text-sm">Destination</label><input id="city" placeholder="hong kong/tokyo/seoul/bangkok" class="w-full p-2 border rounded"></div>
        <div><label class="text-sm">Budget (HKD)</label><input id="budget" type="number" class="w-full p-2 border rounded"></div>
        <div><label class="text-sm">Travelers</label><input id="people" type="number" value="2" class="w-full p-2 border rounded"></div>
        <div><label class="text-sm">Dates</label><input id="dates" class="w-full p-2 border rounded"></div>
        <button type="button" onclick="generatePlan()" class="md:col-span-2 bg-primary text-white p-2 rounded">Generate</button>
    </form>
</section>

<div id="loading" class="hidden text-center py-4">
    <div class="w-10 h-10 border-4 border-t-primary rounded-full animate-spin mx-auto"></div>
</div>

<section id="result" class="hidden">
    <div class="bg-white rounded-2xl p-6 shadow">
        <h3 class="font-bold mb-3">Your Itinerary</h3>
        <div id="tripInfo" class="text-sm p-3 bg-blue-50 rounded mb-3"></div>

        <div class="mb-3">
            <label class="font-sm">AI Adjust Plan:</label>
            <input id="aiInput" placeholder="cheaper / add shopping / change food" class="w-full p-2 border rounded mt-1">
            <!-- 改用 onclick 事件，兼容所有浏览器 -->
            <button onclick="applyAIChange()" class="mt-1 bg-primary text-white px-3 py-1 rounded">Apply AI Change</button>
        </div>

        <div id="tripDetail" class="space-y-3"></div>
    </div>
</section>
</main>

<script>
// 初始化日期选择器
flatpickr("#dates",{mode:"range",dateFormat:"Y-m-d",minDate:"today"});

// 城市数据
const cityData = {
  "hong kong":{
    full:["Disneyland","Ocean Park"],
    spot:["Victoria Harbour","The Peak","Mong Kok","Causeway Bay","Temple Street"],
    food:{
      b:["Pineapple Bun + Milk Tea", "Wonton Noodles", "Egg Tart + Lemon Tea", "French Toast"],
      l:["BBQ Pork Rice", "Beef Brisket Noodles", "Cart Noodles", "Claypot Rice"],
      d:["Dai Pai Dong", "Seafood Platter", "Hot Pot", "Cantonese Cuisine"]
    }
  },
  "tokyo":{
    full:["DisneySea","USJ"],
    spot:["Shibuya Sky","Meiji Shrine","Senso-ji","Ginza","Harajuku"],
    food:{
      b:["Tamagoyaki", "Ramen", "Matcha Breakfast", "Onigiri"],
      l:["Sushi", "Tempura", "Yakitori", "Tonkotsu Ramen"],
      d:["Shabu Shabu", "Izakaya", "Sashimi", "Okonomiyaki"]
    }
  },
  "seoul":{
    full:["Everland","Lotte World"],
    spot:["Gyeongbokgung","N Seoul Tower","Myeongdong","Hongdae","Bukchon"],
    food:{
      b:["Gimbap", "Ramen", "Kimchi Fried Rice", "Tteokbokki"],
      l:["Bibimbap", "Korean BBQ", "Jjigae Stew", "Korean Fried Chicken"],
      d:["Chicken & Beer", "Hot Pot", "Street Food", "Samgyeopsal"]
    }
  },
  "bangkok":{
    full:["Ayutthaya Tour","Safari World"],
    spot:["Grand Palace","Wat Arun","Chatuchak","Asiatique","Chinatown"],
    food:{
      b:["Thai Congee", "Coconut Pancake", "Thai Iced Tea Set", "Khao Soi"],
      l:["Pad Thai", "Green Curry", "Tom Yum Soup", "Mango Sticky Rice"],
      d:["Thai BBQ", "Seafood Fried Rice", "Night Market Food", "Massaman Curry"]
    }
  }
};

// 全局变量存储当前行程
let currentPlan = [];
let currentCity = "";
let currentBudget = 0;
let currentPeople = 0;
let currentDays = 0;

// 生成行程（改用全局函数）
async function generatePlan() {
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");
    loading.classList.remove("hidden");
    result.classList.add("hidden");

    // 获取表单数据
    currentCity = document.getElementById("city").value.toLowerCase().trim();
    currentBudget = Number(document.getElementById("budget").value);
    currentPeople = Number(document.getElementById("people").value);
    const dateObj = document.getElementById("dates")._flatpickr.selectedDates;
    currentDays = Math.ceil((dateObj[1] - dateObj[0]) / 86400000) + 1;
    const city = cityData[currentCity] || cityData["hong kong"];

    // 延迟模拟加载
    await new Promise(resolve => setTimeout(resolve, 1200));

    // 生成不重复的行程
    let usedFull = [], usedNormal = [];
    let usedBreakfast = [], usedLunch = [], usedDinner = [];
    const perDayCost = currentBudget / currentDays / currentPeople;
    currentPlan = [];

    for(let day=1; day<=currentDays; day++) {
        let isFullDay = (currentDays >=3 && day <=2) || Math.random() < 0.35;
        let schedule = [];

        // 选不重复的食物
        let bfOpt = city.food.b.filter(x => !usedBreakfast.includes(x));
        let luOpt = city.food.l.filter(x => !usedLunch.includes(x));
        let diOpt = city.food.d.filter(x => !usedDinner.includes(x));
        let bf = bfOpt.length ? bfOpt[0] : city.food.b[0];
        let lu = luOpt.length ? luOpt[0] : city.food.l[0];
        let di = diOpt.length ? diOpt[0] : city.food.d[0];
        usedBreakfast.push(bf);
        usedLunch.push(lu);
        usedDinner.push(di);

        if(isFullDay && usedFull.length < city.full.length) {
            let spot = city.full.filter(x => !usedFull.includes(x))[0];
            usedFull.push(spot);
            schedule = [
                {t:"08:00-09:00",a:`Breakfast: ${bf}`,c:Math.round(perDayCost*0.1)},
                {t:"09:30-17:30",a:`${spot} (Full Day)`,c:Math.round(perDayCost*0.6)},
                {t:"12:30-14:00",a:"Lunch: Park Meal",c:Math.round(perDayCost*0.18)},
                {t:"18:00-20:00",a:`Dinner: ${di}`,c:Math.round(perDayCost*0.12)}
            ];
        } else {
            let mornSpot = city.spot.filter(x => !usedNormal.includes(x))[0];
            let aftSpot = city.spot.filter(x => !usedNormal.includes(x) && x !== mornSpot)[0];
            usedNormal.push(mornSpot, aftSpot);
            schedule = [
                {t:"08:00-09:00",a:`Breakfast: ${bf}`,c:Math.round(perDayCost*0.1)},
                {t:"09:30-12:00",a:mornSpot,c:Math.round(perDayCost*0.28)},
                {t:"12:30-14:00",a:`Lunch: ${lu}`,c:Math.round(perDayCost*0.22)},
                {t:"14:30-17:30",a:aftSpot,c:Math.round(perDayCost*0.25)},
                {t:"18:00-20:00",a:`Dinner: ${di}`,c:Math.round(perDayCost*0.15)}
            ];
        }
        currentPlan.push({day: day, sched: schedule});
    }

    // 渲染行程
    renderTrip();
    loading.classList.add("hidden");
    result.classList.remove("hidden");
}

// AI 修改行程（全局函数，100% 触发）
function applyAIChange() {
    const aiText = document.getElementById("aiInput").value.trim().toLowerCase();
    if(!aiText || currentPlan.length === 0) {
        alert("Please enter a valid command (e.g. cheaper, add shopping, change food)");
        return;
    }

    const city = cityData[currentCity] || cityData["hong kong"];
    
    // 遍历行程修改
    currentPlan.forEach(day => {
        day.sched.forEach(item => {
            // 降价
            if(aiText.includes("cheap")) {
                if(!item.a.includes("Full Day")) item.c = Math.round(item.c * 0.75);
            }
            // 加购物
            if(aiText.includes("shop")) {
                if(!item.a.includes("Full Day") && !item.a.includes("Shopping")) {
                    item.a += " + Shopping";
                }
            }
            // 换食物
            if(aiText.includes("food")) {
                if(item.a.includes("Breakfast")) {
                    item.a = "Breakfast: " + city.food.b[Math.floor(Math.random() * city.food.b.length)];
                }
                if(item.a.includes("Lunch") && !item.a.includes("Park Meal")) {
                    item.a = "Lunch: " + city.food.l[Math.floor(Math.random() * city.food.l.length)];
                }
                if(item.a.includes("Dinner")) {
                    item.a = "Dinner: " + city.food.d[Math.floor(Math.random() * city.food.d.length)];
                }
            }
        });
    });

    // 重新渲染
    renderTrip();
    alert("✅ AI updated your itinerary successfully!");
}

// 渲染行程
function renderTrip() {
    // 渲染基本信息
    document.getElementById("tripInfo").innerText = 
        `Destination: ${currentCity.toUpperCase()} | Budget: HK$${currentBudget.toLocaleString()} | Travelers: ${currentPeople} | Days: ${currentDays}`;
    
    // 渲染详细行程
    let html = "";
    currentPlan.forEach(day => {
        html += `<div class="border rounded overflow-hidden">
            <div class="bg-blue-100 p-2 font-bold text-sm">Day ${day.day}</div>
            <div class="p-2 text-sm space-y-1">`;
        day.sched.forEach(item => {
            html += `<div class="border-b pb-1">
                <span class="bg-blue-100 text-xs px-1 rounded">${item.t}</span>
                <div class="font-medium">${item.a}</div>
                <div class="text-primary text-xs">HK$${item.c}</div>
            </div>`;
        });
        html += `</div></div>`;
    });
    document.getElementById("tripDetail").innerHTML = html;
}
</script>
</body>
</html>
