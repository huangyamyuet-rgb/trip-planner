<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hong Kong Trip Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        neutral: '#F5F7FA'
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .card-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
            .btn-gradient { background: linear-gradient(135deg, #165DFF, #36CFC9); }
        }
    </style>
</head>
<body class="bg-neutral min-h-screen">
    <header class="bg-white shadow sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa fa-plane text-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-primary">AI Trip Planner</h1>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <section class="max-w-4xl mx-auto bg-white rounded-2xl p-6 md:p-10 card-shadow mb-12">
            <h2 class="text-2xl font-bold mb-6 text-center">Hong Kong Travel Plan</h2>
            <form id="tripForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-gray-700 font-medium"><i class="fa fa-map-marker text-primary mr-1"></i>Destination</label>
                    <input type="text" id="destination" value="Hong Kong" required class="w-full px-4 py-3 border rounded-lg">
                </div>
                <div class="space-y-2">
                    <label class="text-gray-700 font-medium"><i class="fa fa-money text-primary mr-1"></i>Budget (HKD)</label>
                    <input type="number" id="budget" placeholder="e.g. 10000" required class="w-full px-4 py-3 border rounded-lg">
                </div>
                <div class="space-y-2">
                    <label class="text-gray-700 font-medium"><i class="fa fa-heart text-primary mr-1"></i>Interests</label>
                    <input type="text" placeholder="Food, Shopping, Culture" required class="w-full px-4 py-3 border rounded-lg">
                </div>
                <div class="space-y-2">
                    <label class="text-gray-700 font-medium"><i class="fa fa-users text-primary mr-1"></i>Travelers</label>
                    <input type="number" min="1" value="2" required class="w-full px-4 py-3 border rounded-lg">
                </div>
                <div class="space-y-2 md:col-span-2">
                    <label class="text-gray-700 font-medium"><i class="fa fa-calendar text-primary mr-1"></i>Travel Dates</label>
                    <input type="text" id="tripDates" placeholder="Select dates" required class="w-full px-4 py-3 border rounded-lg">
                </div>
                <div class="md:col-span-2 mt-2">
                    <button type="submit" class="w-full btn-gradient text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2">
                        <i class="fa fa-magic"></i> Generate Food & Attraction Plan
                    </button>
                </div>
            </form>
        </section>

        <div id="loading" class="hidden flex flex-col items-center py-10">
            <div class="w-16 h-16 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
            <p class="text-gray-600 mt-4">Generating your Hong Kong food & attraction itinerary...</p>
        </div>

        <section id="resultSection" class="max-w-5xl mx-auto hidden">
            <div class="bg-white rounded-2xl p-6 md:p-10 card-shadow">
                <h2 class="text-2xl font-bold text-primary mb-6">Your Hong Kong Itinerary</h2>
                <div id="tripInfo" class="grid grid-cols-1 md:grid-cols-4 gap-4 p-5 bg-primary/5 rounded-xl mb-8"></div>
                <div id="tripDetail" class="space-y-8"></div>
            </div>
        </section>
    </main>

    <script>
        flatpickr("#tripDates", { mode: "range", dateFormat: "Y-m-d", minDate: "today" });

        // Full-day attractions
        const fullDaySpots = [
            "Hong Kong Disneyland",
            "Ocean Park",
            "Lantau Island & Big Buddha",
            "Ngong Ping 360 + Tai O Village",
            "Lamma Island Day Tour",
            "Cheung Chau Island Day Tour"
        ];

        // Normal spots (no repetition)
        const normalSpots = [
            "Victoria Harbour",
            "The Peak (Victoria Peak)",
            "Tsim Sha Tsui Avenue of Stars",
            "K11 Musea",
            "Harbour City",
            "Causeway Bay",
            "Times Square",
            "Mong Kok",
            "Ladies Market",
            "Temple Street Night Market",
            "Central",
            "Soho District",
            "Hollywood Road",
            "Man Mo Temple",
            "Wan Chai",
            "Golden Bauhinia Square",
            "Stanley Market",
            "Repulse Bay",
            "Shek O",
            "West Kowloon Cultural District",
            "M+ Museum",
            "Hong Kong Palace Museum",
            "Kowloon Park",
            "Clock Tower"
        ];

        // Hong Kong local food
        const hkBreakfast = [
            "Pineapple Bun + Iced Hong Kong Milk Tea",
            "French Toast with Condensed Milk",
            "Shrimp Wonton Noodles",
            "Scrambled Egg Sandwich + Lemon Tea",
            "Hong Kong Style Egg Tart"
        ];

        const hkLunch = [
            "BBQ Pork & Duck Rice (Siu Lap)",
            "Beef Brisket Noodles",
            "Claypot Rice with Chinese Sausage",
            "Cart Noodles with Fish Balls & Tripe",
            "Wonton Noodle Soup",
            "Hong Kong Style Fried Rice"
        ];

        const hkDinner = [
            "Dinner at Temple Street Dai Pai Dong",
            "Seafood Platter at Repulse Bay",
            "Cantonese Cuisine with Victoria Harbour View",
            "Hot Pot Soup with Local Ingredients",
            "Beef Wagyu Congee & Youtiao",
            "Night Market Seafood Snack Feast"
        ];

        const disneyDining = [
            "Royal Banquet Hall Cantonese Set",
            "Rocket Restaurant Burger & Fries",
            "Main Street Corner Bakery Snacks"
        ];

        const oceanParkDining = [
            "Sea Lion Whale Watching Restaurant",
            "Hong Kong Old Street Fish Balls & Egg Puffs",
            "Polar Adventure Western Meal"
        ];

        // Get random food
        function getBreakfast() { return hkBreakfast[Math.floor(Math.random()*hkBreakfast.length)]; }
        function getLunch() { return hkLunch[Math.floor(Math.random()*hkLunch.length)]; }
        function getDinner() { return hkDinner[Math.floor(Math.random()*hkDinner.length)]; }
        function getDisneyMeal() { return disneyDining[Math.floor(Math.random()*disneyDining.length)]; }
        function getOceanParkMeal() { return oceanParkDining[Math.floor(Math.random()*oceanParkDining.length)]; }

        // Main generate logic
        document.getElementById("tripForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const loading = document.getElementById("loading");
            const result = document.getElementById("resultSection");
            loading.classList.remove("hidden");
            result.classList.add("hidden");

            const budget = document.getElementById("budget").value;
            const dates = document.getElementById("tripDates")._flatpickr.selectedDates;
            const days = Math.ceil((dates[1]-dates[0])/86400000)+1;
            const start = dates[0].toISOString().split("T")[0];
            const end = dates[1].toISOString().split("T")[0];

            await new Promise(r => setTimeout(r, 2200));

            // Copy arrays to avoid repetition
            let usedNormal = [];
            let usedFullDay = [];
            let plan = [];

            for (let day=1; day<=days; day++) {
                let isFullDay = (day <= 2 && days >= 3) || (Math.random() < 0.3);
                let schedule;

                if (isFullDay && usedFullDay.length < fullDaySpots.length) {
                    // Full day: Disney / Ocean Park etc.
                    let availFull = fullDaySpots.filter(s => !usedFullDay.includes(s));
                    let spot = availFull[Math.floor(Math.random()*availFull.length)];
                    usedFullDay.push(spot);

                    let dining = spot.includes("Disney") ? getDisneyMeal() : spot.includes("Ocean") ? getOceanParkMeal() : getLunch();

                    schedule = [
                        { time: "08:00-09:00", act: `Breakfast: ${getBreakfast()}`, cost: Math.round(budget/days/2*0.12) },
                        { time: "09:30-17:30", act: `${spot} (Full Day Visit)`, cost: Math.round(budget/days/2*0.6) },
                        { time: "12:30-14:00", act: `Lunch Inside Park: ${dining}`, cost: Math.round(budget/days/2*0.18) },
                        { time: "18:00-20:00", act: `Dinner: ${getDinner()}`, cost: Math.round(budget/days/2*0.1) }
                    ];
                } else {
                    // Morning spot
                    let availMorn = normalSpots.filter(s => !usedNormal.includes(s));
                    let morn = availMorn[Math.floor(Math.random()*availMorn.length)];
                    usedNormal.push(morn);

                    // Afternoon spot (no repeat)
                    let availAft = normalSpots.filter(s => !usedNormal.includes(s));
                    let aft = availAft[Math.floor(Math.random()*availAft.length)];
                    usedNormal.push(aft);

                    schedule = [
                        { time: "08:00-09:00", act: `Breakfast: ${getBreakfast()}`, cost: Math.round(budget/days/2*0.12) },
                        { time: "09:30-12:00", act: morn, cost: Math.round(budget/days/2*0.28) },
                        { time: "12:30-14:00", act: `Lunch: ${getLunch()}`, cost: Math.round(budget/days/2*0.2) },
                        { time: "14:30-17:30", act: aft, cost: Math.round(budget/days/2*0.25) },
                        { time: "18:00-20:00", act: `Dinner: ${getDinner()}`, cost: Math.round(budget/days/2*0.15) }
                    ];
                }

                plan.push({ day, schedule });
            }

            // Render result
            document.getElementById("tripInfo").innerHTML = `
                <div class="flex gap-2 items-center"><i class="fa fa-map-marker text-primary text-xl"></i><div><p class="text-gray-500 text-sm">Destination</p><p class="font-medium">HONG KONG</p></div></div>
                <div class="flex gap-2 items-center"><i class="fa fa-money text-primary text-xl"></i><div><p class="text-gray-500 text-sm">Budget</p><p class="font-medium">HK$${Number(budget).toLocaleString()}</p></div></div>
                <div class="flex gap-2 items-center"><i class="fa fa-calendar text-primary text-xl"></i><div><p class="text-gray-500 text-sm">Period</p><p class="font-medium">${start} to ${end}</p></div></div>
                <div class="flex gap-2 items-center"><i class="fa fa-cutlery text-primary text-xl"></i><div><p class="text-gray-500 text-sm">Food</p><p class="font-medium">Local Hong Kong Cuisine</p></div></div>
            `;

            let out = document.getElementById("tripDetail");
            out.innerHTML = "";
            plan.forEach(day => {
                let html = `<div class="border rounded-xl overflow-hidden mb-6">
                    <div class="bg-primary/10 p-4 font-bold text-lg">Day ${day.day}</div>
                    <div class="p-5 space-y-4">`;
                day.schedule.forEach(item => {
                    html += `
                    <div class="flex gap-4 pb-4 border-b">
                        <div class="w-32"><span class="bg-primary/10 text-primary px-3 py-1 rounded-full text-sm">${item.time}</span></div>
                        <div class="flex-1"><h4 class="font-bold text-lg">${item.act}</h4><p class="text-primary font-medium">HK$${item.cost}</p></div>
                    </div>`;
                });
                html += "</div></div>";
                out.innerHTML += html;
            });

            loading.classList.add("hidden");
            result.classList.remove("hidden");
        });
    </script>
</body>
</html>
